<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울 지하철 N행시</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff; min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        header h1 {
            font-size: 2.2em; margin-bottom: 8px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        header p { color: #888; font-size: 1em; }
        
        .main-layout {
            display: grid; grid-template-columns: 260px 1fr 340px;
            gap: 20px; margin-top: 20px;
        }
        @media (max-width: 1200px) { .main-layout { grid-template-columns: 1fr; } }
        
        .panel {
            background: rgba(255,255,255,0.05); border-radius: 16px;
            padding: 20px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .panel h2 { 
            margin-bottom: 15px; font-size: 1.1em; color: #00d4ff;
            display: flex; align-items: center; gap: 8px;
        }
        
        .search-box {
            width: 100%; padding: 12px 15px; border: none;
            border-radius: 8px; background: rgba(255,255,255,0.1);
            color: #fff; font-size: 0.9em; margin-bottom: 12px;
        }
        .station-list { max-height: 520px; overflow-y: auto; }
        .station-item {
            padding: 12px; margin-bottom: 8px;
            background: rgba(255,255,255,0.03); border-radius: 8px;
            cursor: pointer; transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        .station-item:hover { 
            background: rgba(0,212,255,0.1); 
            transform: translateX(3px);
        }
        .station-item.active { 
            background: rgba(0,212,255,0.15); 
            border-left-color: #00d4ff;
        }
        .station-item.has-poem { border-left-color: #ff006e; }
        .station-name { font-weight: 500; font-size: 0.95em; }
        .station-name .chars {
            display: inline-flex; gap: 2px;
            margin-left: 6px; font-size: 0.75em;
        }
        .station-name .char-tag {
            background: rgba(0,212,255,0.2); color: #00d4ff;
            padding: 2px 5px; border-radius: 3px;
        }
        .station-badge {
            float: right; font-size: 0.7em; padding: 3px 8px;
            background: #ff006e; border-radius: 10px;
        }
        
        .map-wrapper { position: relative; height: 480px; }
        #station-map { width: 100%; height: 100%; }
        .station-circle {
            fill: #00d4ff; stroke: #fff; stroke-width: 2;
            cursor: pointer; transition: all 0.3s ease;
        }
        .station-circle:hover { r: 10; }
        .station-circle.selected { fill: #ff006e; stroke-width: 3; }
        .station-circle.has-poem { fill: #ff006e; }
        .station-label { fill: #fff; font-size: 10px; text-anchor: middle; pointer-events: none; }
        
        .poem-section { margin-top: 0; }
        .poem-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .poem-title { font-size: 1.15em; color: #fff; }
        .poem-title .station-name { color: #00d4ff; }
        .poem-count { 
            font-size: 0.8em; color: #888;
            background: rgba(255,255,255,0.1); padding: 4px 10px;
            border-radius: 12px;
        }
        
        .poem-list { max-height: 280px; overflow-y: auto; }
        .poem-card {
            background: rgba(0,0,0,0.25); border-radius: 12px;
            padding: 15px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .poem-card:hover { border-color: rgba(0,212,255,0.3); }
        .poem-lines { margin-bottom: 12px; }
        .poem-line {
            display: flex; align-items: center; gap: 10px;
            margin: 6px 0; padding: 6px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
        }
        .poem-line:last-child { border-bottom: none; }
        .poem-char-box {
            width: 28px; height: 28px; border-radius: 8px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.95em; font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,212,255,0.3);
        }
        .poem-text { color: #eee; font-size: 0.95em; flex: 1; }
        .poem-meta {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75em; color: #666; margin-top: 8px;
            padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .poem-actions { display: flex; gap: 6px; }
        .poem-btn {
            padding: 5px 12px; border: none; border-radius: 6px;
            background: rgba(255,255,255,0.1); color: #aaa;
            font-size: 0.75em; cursor: pointer; transition: all 0.2s;
        }
        .poem-btn:hover { background: rgba(0,212,255,0.3); color: #fff; }
        .poem-btn.delete:hover { background: rgba(255,0,110,0.3); color: #ff006e; }
        
        .poem-form {
            background: linear-gradient(135deg, rgba(0,212,255,0.08), rgba(123,44,191,0.08));
            border-radius: 14px; padding: 18px; margin-top: 15px;
            border: 1px dashed rgba(0,212,255,0.4);
        }
        .form-title {
            font-size: 0.9em; color: #00d4ff; margin-bottom: 12px;
            display: flex; align-items: center; gap: 6px;
        }
        .form-station {
            display: flex; gap: 6px; margin-bottom: 15px;
            padding: 12px; background: rgba(0,0,0,0.2);
            border-radius: 10px; justify-content: center;
        }
        .form-station-char {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, #ff006e, #7b2cbf);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1em; font-weight: bold;
            box-shadow: 0 3px 12px rgba(255,0,110,0.3);
        }
        .poem-inputs { display: flex; flex-direction: column; gap: 10px; }
        .poem-input-row {
            display: flex; align-items: center; gap: 12px;
            background: rgba(0,0,0,0.15); padding: 8px 12px;
            border-radius: 8px;
        }
        .poem-input-row .char-label {
            width: 28px; height: 28px; border-radius: 8px;
            background: rgba(0,212,255,0.15); border: 1px solid rgba(0,212,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9em; font-weight: bold; color: #00d4ff;
        }
        .poem-input-row input {
            flex: 1; padding: 10px 12px; border: none;
            border-radius: 6px; background: rgba(255,255,255,0.08);
            color: #fff; font-size: 0.9em;
        }
        .poem-input-row input:focus {
            outline: none; background: rgba(255,255,255,0.12);
        }
        .poem-input-row input::placeholder { color: #555; }
        .form-actions {
            display: flex; gap: 10px; margin-top: 15px;
        }
        .form-btn {
            flex: 1; padding: 12px; border: none;
            border-radius: 8px; font-size: 0.9em; cursor: pointer;
            transition: all 0.2s; font-weight: 500;
        }
        .form-btn.primary {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: #fff;
        }
        .form-btn.secondary {
            background: rgba(255,255,255,0.1); color: #aaa;
        }
        .form-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .empty-state {
            text-align: center; padding: 50px 20px;
            color: #555; font-size: 0.9em;
        }
        .empty-state-icon { font-size: 3.5em; margin-bottom: 15px; }
        
        .guide-box {
            background: rgba(255,255,255,0.03); border-radius: 10px;
            padding: 12px 15px; margin-bottom: 15px;
            font-size: 0.82em; color: #777; line-height: 1.6;
        }
        .guide-box strong { color: #00d4ff; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.3); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚇 서울 지하철 N행시</h1>
            <p>역 이름으로 만들어가는 우리만의 시</p>
        </header>
        
        <div class="main-layout">
            <!-- 왼쪽: 역 목록 -->
            <div class="panel">
                <h2>📍 역 목록</h2>
                <input type="text" class="search-box" id="searchInput" placeholder="역 이름 검색...">
                <div class="station-list" id="stationList"></div>
            </div>
            
            <!-- 중앙: 지도 -->
            <div class="panel">
                <h2>🗺️ 노선도</h2>
                <div class="guide-box">
                    💡 <strong>팁:</strong> 역을 클릭하면 해당 역의 한글 이름으로 N행시를 작성할 수 있습니다.<br>
                    예: <strong>강남역</strong> → 강: ~ / 남: ~ / 역: ~
                </div>
                <div class="map-wrapper">
                    <svg id="station-map"></svg>
                </div>
            </div>
            
            <!-- 오른쪽: N행시 패널 -->
            <div class="panel poem-section">
                <div class="poem-header">
                    <span class="poem-title" id="poemPanelTitle">📝 N행시</span>
                    <span class="poem-count" id="poemCount">0편</span>
                </div>
                
                <div id="poemContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">🚉</div>
                        <p>역을 선택하면<br>N행시를 작성할 수 있습니다</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 한글 역명 데이터
        const csvData = `id,name,x,y
"gangnam","강남역","28.726837158203125","-5.500052452087402"
"hongdae","홍대입구역","16.25078558921814","5.299947738647461"
"itaewon","이태원역","21.250202178955078","-5.500052452087402"
"dongdaemun","동대문역","20.500194549560547","-5.500052452087402"
"myeongdong","명동역","18.953306198120117","-5.500052452087402"
"jamsil","잠실역","19.25018310546875","-5.500052452087402"
"yeouido","여의도역","22.937719345092773","-5.500052452087402"
"gwanghwamun","광화문역","18.242361068725586","-5.500052452087402"
"sinchon","신촌역","25.476804733276367","-5.500052452087402"
"apgujeong","압구정역","27.273696899414062","-5.500052452087402"
"sadang","사당역","25.578369140625","-5.500052452087402"
"sillim","신림역","13.93763256072998","-5.500052452087402"
"jongno","종로3가역","29.086214065551758","-5.500052452087402"
"seoul-station","서울역","16.288029670715332","5.299947738647461"
"samsung","삼성역","27.953392028808594","-5.500052452087402"
"konkuk","건대입구역","24.9924259185791","-5.500052452087402"
"wangsimni","왕십리역","28.219018936157227","-5.500052452087402"
"suyu","수유역","26.640878677368164","-5.500052452087402"
"sindorim","신도림역","14.547013282775879","-5.500052452087402"
"guro","구로역","17.320478439331055","-5.500052452087402"`;

        let stations = [];
        let selectedStation = null;
        let poems = {};
        let editingPoemId = null;

        function loadPoemsFromStorage() {
            const saved = localStorage.getItem('subwayPoems');
            if (saved) poems = JSON.parse(saved);
        }

        function savePoemsToStorage() {
            localStorage.setItem('subwayPoems', JSON.stringify(poems));
        }

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            return lines.slice(1).map(line => {
                const values = line.match(/("[^"]*"|[^,]*)/g);
                return {
                    id: values[0].replace(/"/g, ''),
                    name: values[1].replace(/"/g, ''),
                    x: parseFloat(values[2]),
                    y: parseFloat(values[3])
                };
            });
        }

        function loadStations() {
            stations = parseCSV(csvData);
            loadPoemsFromStorage();
            renderStationList(stations);
            renderMap(stations);
        }

        function renderStationList(data) {
            const list = document.getElementById('stationList');
            list.innerHTML = data.map(station => {
                const hasPoem = poems[station.id] && poems[station.id].length > 0;
                const chars = station.name.split('').filter(c => c !== '역');
                return `
                    <div class="station-item ${hasPoem ? 'has-poem' : ''} ${selectedStation?.id === station.id ? 'active' : ''}" 
                         data-id="${station.id}" onclick="selectStation('${station.id}')">
                        <span class="station-name">
                            ${station.name}
                            <span class="chars">
                                ${chars.map(c => `<span class="char-tag">${c}</span>`).join('')}
                            </span>
                        </span>
                        ${hasPoem ? `<span class="station-badge">${poems[station.id].length}</span>` : ''}
                    </div>
                `;
            }).join('');
        }

        function renderMap(data) {
            const svg = document.getElementById('station-map');
            const container = document.querySelector('.map-wrapper');
            const w = container.clientWidth, h = container.clientHeight;
            svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
            
            const xv = data.map(s => s.x), yv = data.map(s => s.y);
            const minX = Math.min(...xv), maxX = Math.max(...xv);
            const minY = Math.min(...yv), maxY = Math.max(...yv);
            const pad = 40, sx = (w - pad * 2) / (maxX - minX || 1);
            const sy = (h - pad * 2) / (maxY - minY || 1);
            
            let html = `<path d="M `;
            data.forEach((st, i) => {
                const cx = pad + (st.x - minX) * sx;
                const cy = pad + (st.y - minY) * sy;
                html += i === 0 ? `${cx} ${cy}` : ` L ${cx} ${cy}`;
            });
            html += `" fill="none" stroke="rgba(0,212,255,0.15)" stroke-width="2" stroke-dasharray="5,5"/>`;
            
            data.forEach(station => {
                const hasPoem = poems[station.id] && poems[station.id].length > 0;
                const isSelected = selectedStation?.id === station.id;
                const cx = pad + (station.x - minX) * sx;
                const cy = pad + (station.y - minY) * sy;
                
                html += `<circle class="station-circle ${hasPoem ? 'has-poem' : ''} ${isSelected ? 'selected' : ''}" 
                    id="circle-${station.id}" cx="${cx}" cy="${cy}" r="${isSelected ? 10 : (hasPoem ? 8 : 6)}"
                    onclick="selectStation('${station.id}')"/>`;
                html += `<text class="station-label" x="${cx}" y="${cy + 20}">${station.name}</text>`;
            });
            
            svg.innerHTML = html;
        }

        function selectStation(id) {
            selectedStation = stations.find(s => s.id === id);
            if (!selectedStation) return;
            renderStationList(stations);
            renderMap(stations);
            renderPoemPanel();
        }

        function getStationChars(stationName) {
            // '역' 제외하고 한글 글자만 추출
            return stationName.split('').filter(c => c !== '역' && /[\uac00-\ud7af]/.test(c));
        }

        function renderPoemPanel() {
            const container = document.getElementById('poemContent');
            const title = document.getElementById('poemPanelTitle');
            const count = document.getElementById('poemCount');
            
            if (!selectedStation) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🚉</div>
                        <p>역을 선택하면<br>N행시를 작성할 수 있습니다</p>
                    </div>`;
                title.innerHTML = '📝 N행시';
                count.textContent = '0편';
                return;
            }
            
            const stationPoems = poems[selectedStation.id] || [];
            const stationChars = getStationChars(selectedStation.name);
            
            title.innerHTML = `<span class="station-name">${selectedStation.name}</span> N행시`;
            count.textContent = `${stationPoems.length}편`;
            
            let html = '<div class="poem-list">';
            
            if (stationPoems.length > 0) {
                stationPoems.forEach((poem, idx) => {
                    html += `
                        <div class="poem-card">
                            <div class="poem-lines">
                                ${poem.lines.map((line, i) => `
                                    <div class="poem-line">
                                        <span class="poem-char-box">${line.char}</span>
                                        <span class="poem-text">${line.text}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="poem-meta">
                                <span>${poem.date}</span>
                                <div class="poem-actions">
                                    <button class="poem-btn" onclick="editPoem(${idx})">✏️ 수정</button>
                                    <button class="poem-btn delete" onclick="deletePoem(${idx})">🗑️ 삭제</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            
            html += '</div>';
            
            const isEditing = editingPoemId !== null;
            const editPoem = isEditing ? stationPoems[editingPoemId] : null;
            
            html += `
                <div class="poem-form">
                    <div class="form-title">${isEditing ? '✏️ N행시 수정' : '✨ 새 N행시 작성'}</div>
                    <div class="form-station">
                        ${stationChars.map((c, i) => `<div class="form-station-char">${c}</div>`).join('')}
                    </div>
                    <div class="poem-inputs" id="poemInputs">
                        ${stationChars.map((char, i) => `
                            <div class="poem-input-row">
                                <span class="char-label">${char}</span>
                                <input type="text" 
                                       id="poem-line-${i}" 
                                       placeholder="'${char}'(으)로 시작하는 문장을 입력하세요"
                                       value="${editPoem ? editPoem.lines[i]?.text || '' : ''}">
                            </div>
                        `).join('')}
                    </div>
                    <div class="form-actions">
                        <button class="form-btn primary" onclick="${isEditing ? 'updatePoem()' : 'savePoem()'}">
                            ${isEditing ? '💾 수정 완료' : '💾 저장하기'}
                        </button>
                        ${isEditing ? `<button class="form-btn secondary" onclick="cancelEdit()">❌ 취소</button>` : ''}
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
        }

        function savePoem() {
            if (!selectedStation) return;
            
            const stationChars = getStationChars(selectedStation.name);
            const lines = stationChars.map((char, i) => ({
                char: char,
                text: document.getElementById(`poem-line-${i}`).value.trim()
            }));
            
            if (lines.some(l => !l.text)) {
                alert('모든 행을 작성해주세요!');
                return;
            }
            
            // 각 행이 해당 글자로 시작하는지 확인
            for (let i = 0; i < lines.length; i++) {
                if (!lines[i].text.startsWith(lines[i].char)) {
                    alert(`'${lines[i].char}'(으)로 시작하는 문장을 입력해주세요!`);
                    document.getElementById(`poem-line-${i}`).focus();
                    return;
                }
            }
            
            const newPoem = {
                id: Date.now(),
                lines: lines,
                date: new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' })
            };
            
            if (!poems[selectedStation.id]) poems[selectedStation.id] = [];
            poems[selectedStation.id].push(newPoem);
            
            savePoemsToStorage();
            renderPoemPanel();
            renderStationList(stations);
            renderMap(stations);
        }

        function editPoem(index) {
            editingPoemId = index;
            renderPoemPanel();
        }

        function updatePoem() {
            if (!selectedStation || editingPoemId === null) return;
            
            const stationChars = getStationChars(selectedStation.name);
            const lines = stationChars.map((char, i) => ({
                char: char,
                text: document.getElementById(`poem-line-${i}`).value.trim()
            }));
            
            if (lines.some(l => !l.text)) {
                alert('모든 행을 작성해주세요!');
                return;
            }
            
            for (let i = 0; i < lines.length; i++) {
                if (!lines[i].text.startsWith(lines[i].char)) {
                    alert(`'${lines[i].char}'(으)로 시작하는 문장을 입력해주세요!`);
                    return;
                }
            }
            
            poems[selectedStation.id][editingPoemId].lines = lines;
            poems[selectedStation.id][editingPoemId].date += ' (수정됨)';
            
            savePoemsToStorage();
            editingPoemId = null;
            renderPoemPanel();
        }

        function cancelEdit() {
            editingPoemId = null;
            renderPoemPanel();
        }

        function deletePoem(index) {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            poems[selectedStation.id].splice(index, 1);
            if (poems[selectedStation.id].length === 0) delete poems[selectedStation.id];
            savePoemsToStorage();
            renderPoemPanel();
            renderStationList(stations);
            renderMap(stations);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            renderStationList(stations.filter(s => s.name.includes(term)));
        });

        loadStations();
        window.addEventListener('resize', () => renderMap(stations));
    </script>
</body>
</html>
